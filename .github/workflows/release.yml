name: Release

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.11

      - name: Build sdist + wheel
        run: uv build

      - name: Verify built version matches tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          built=$(uv run --no-sync --with ./dist/*.whl python -c "import prolific_mcp; print(prolific_mcp.__version__)")
          echo "tag=${tag} built=${built}"
          test "${built}" = "${tag}"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  publish-mcp-registry:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      MCP_PUBLISHER_VERSION: "1.2.4"
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -fsSL -o mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/download/v${MCP_PUBLISHER_VERSION}/mcp-publisher_${MCP_PUBLISHER_VERSION}_linux_amd64.tar.gz"
          tar -xzf mcp-publisher.tar.gz mcp-publisher
          chmod +x mcp-publisher

      - name: Stamp version into server.json
        run: |
          tag="${GITHUB_REF_NAME#v}"
          jq --arg v "${tag}" \
            '.version = $v | .packages[0].version = $v' \
            server.json > server.json.tmp
          mv server.json.tmp server.json
          cat server.json

      - name: Login to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
